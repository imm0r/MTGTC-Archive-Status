name: Summary CI
on:
  schedule:
    - cron: '0 0 * * *'
  repository_dispatch:
    types:
      - Webhook_*
  workflow_dispatch:
permissions:
  contents: write
  deployments: write
  pull-requests: write
jobs:
  release:
    name: Generate Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Generate summary
        uses: upptime/summary@master
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          commit_message: "summary: update summary [skip ci]"
