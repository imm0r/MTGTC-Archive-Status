name: Check the uptime of the website
on:
  schedule:
    - cron: '*/5 * * * *'
  repository_dispatch:
    types:
      - Webhook_*
      - api_request
  workflow_dispatch:
permissions:
  checks: write
  contents: write
  deployments: write
  pull-requests: write
  statuses: write
jobs:
  release:
    name: Check Status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Check Status
        uses: upptime/uptime-monitor@v1.39.0
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          commit_message: "status: update summary [skip ci]"
          status_website_token: ${{ secrets.STATUS_WEBSITE_TOKEN }}
